# Footer configuration
# You should create one of these files for each language you support. E.g. /_data/es/footer.yml for the spanish version of the footer
# Footer content is organized in columns.
# You can also add a small print license statement at the bottom.

# Columns (the more you add, the narrower they will be)
columns:
  - name: Network
    description: |
      <img src="/assets/images/badges/pn-green-logo.png" alt="GBIF Node Badge" width="100" height="100"> <img src="/assets/images/badges/p-green-logo.png" alt="GBIF Publisher Badge" width="100" height="100">
  - name: Feedback
    description: |
      [Create a new GitHub Issue](https://github.com/gbif/hp-idigbio/issues/new) to request a feature, report a bug, or provide feedback.
  - name: Connect
    description: |
      [Join us on Slack](https://join.slack.com/t/idigbiocommunity/shared_invite/zt-1dqdkhcfb-kE8ELmB8HXH_6Kd3hL48VQ)
    connectIcons: true

