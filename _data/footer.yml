# Footer configuration
# You should create one of these files for each language you support. E.g. /_data/es/footer.yml for the spanish version of the footer
# Footer content is organized in columns.
# You can also add a small print license statement at the bottom.

# Columns (the more you add, the narrower they will be)
columns:
  - name: Network
    description: |
      [The GBIF Network](https://www.gbif.org/the-gbif-network)
      
      [GBIF North America Region](https://www.gbif-north-america.org/)
      
      <a href="https://www.gbif.org/participant/375"><img src="/assets/images/badges/pn-green-logo.png" alt="GBIF Node Badge" width="125" height="125"></a><a href="https://www.gbif.org/publisher/a86e9e36-12ec-49a4-a94c-c0c981fffb71"><img src="/assets/images/badges/p-green-logo.png" alt="GBIF Publisher Badge" width="125" height="125"></a>
  - name: Feedback
    description: |
      To request a feature, report a bug, or provide feedback, [create a new GitHub Issue](https://github.com/gbif/hp-idigbio/issues/new) (sign-in required).
  - name: Connect
    description: |
      [Node Staff Directory](https://www.gbif.org/participant/375)
      
      [Join the community on Slack!](https://join.slack.com/t/idigbiocommunity/shared_invite/zt-1dqdkhcfb-kE8ELmB8HXH_6Kd3hL48VQ)
      
      View this site in another language:
      <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
      <script type="text/javascript">
        function googleTranslateElementInit() {
          new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
        }
      </script>
      <div id="google_translate_element"></div> 
    connectIcons: true

