about:
  klass: aboutSplit
  reverse: true
  title: Making data and images of millions of biological specimens available on the web.
  description: |
      iDigBio is an [Other Associate Participant Node](https://www.gbif.org/participant/375) and [Data Publisher](https://www.gbif.org/publisher/a86e9e36-12ec-49a4-a94c-c0c981fffb71) within the [GBIF Network](https://www.gbif.org/the-gbif-network). Our focus is on specimen-based biodiversity collections from U.S. institutions. We promote and catalyze digitization, mobilization, and use of data about biodiversity specimens through community capacity building, open data, and innovative uses of these data. We envision a world in which digitized biodiversity and extended specimen data underpin research, policy, and economic decision-making.
  background: "{{ site.data.images.ImagingStation.src }}"
  alt: "{{ site.data.images.ImagingStation.alt }}"
  imageLicense: "{{ site.data.images.ImagingStation.caption }}"
  ratio: 70
  cta:
  - text: Learn More
    href: /en/about
    isPrimary: true

