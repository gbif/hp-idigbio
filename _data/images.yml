###################################################################

################################################
# FOR CONSISTENCY WHEN USING IMAGES FROM GBIF:
# CodeName: use the common name underneath the scientific name at the top of the GBIF occurrence page; remove all spaces, dashes, etc. to be safe
#   src: use the "Identifier" link associated with the image on the GBIF occurrence page
#   alt: use the scientific name at the top of the GBIF occurrence page plus a reference to the occurence ID
#   caption: use the "Suggested attribution" associated with the image on the GBIF occurrence; if possible, link to the hosted portal using the GBIF ID otherwise link to GBIF
################################################


