# it is possible to refer to images in front matter and access these images. 
# Or you can choose to just type them in the front matter. It is a matter of preference. 
# If you reuse images a lot, it can be convinent to only have them one place.

# So in your front matter you can either use this data file :
# background:  "{{ site.data.images.catocala_ilia_cramer.src }}"
# imageLicense: "{{ site.data.images.catocala_ilia_cramer.caption }}"
#
# or you can just type it in that file
# background:  /assets/images/placeholders/irpex_spiculifer_1135723338.jpg
# imageLicense: [Isotype of _Irpex spiculifer_ G.Cunn.](https://www.gbif.org/occurrence/1135723338) from [Manaaki Whenua - Landcare Research](/collection/034e128e-ee23-42d4-989d-cbe406c04fdb)


# HELP MAKE THESE CONSISTENT WHEN USING IMAGES FROM GBIF
# CodeName: use the common name underneath the scientific name at the top of the GBIF occurrence page; remove all spaces, dashes, etc. to be safe
#   src: use the "Identifier" link associated with the image on the GBIF occurrence page
#   alt: use the scientific name at the top of the GBIF occurrence page plus a reference to the occurence ID
#   caption: use the "Suggested attribution" associated with the image on the GBIF occurrence; if possible, link to the hosted portal using the GBIF ID otherwise link to GBIF

GeckoTokay:
  src: https://inaturalist-open-data.s3.amazonaws.com/photos/180342639/original.jpeg
  # not sure why this won't work for the config background? src: assets/images/GeckoTokay3698251722.jpeg
  alt: "Gekko gecko media from GBIF occurence 3698251722"
  caption: "[*Gekko gecko* (Linnaeus, 1758)](https://www.gbif.org/occurrence/3698251722) Observed in United States of America by Mikie Green (licensed under [CC BY-NC 4.0](http://creativecommons.org/licenses/by-nc/4.0/))"

FishImaging:
  src: assets/images/FishImagingFLMNH.jpg
  alt: "Digital imaging of a fish in a squeeze tank"
  caption: "Digital imaging of a fish in a squeeze tank at the Florida Museum. Image by Gil Neslon. Licensed under CC BY-NC 4.0."

CaliforniaPoppy:
  src: https://inaturalist-open-data.s3.amazonaws.com/photos/270962732/original.jpg
  alt: "Eschscholzia californica Cham. media from GBIF occurence 4121349597"
  caption: "[*Eschscholzia californica* Cham.](https://www.gbif.org/occurrence/4121349597) Observed in United States of America by Wildrose (licensed under [CC BY-NC 4.0](http://creativecommons.org/licenses/by-nc/4.0/))"

